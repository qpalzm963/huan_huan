<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#4AAFDC"/>
  <!-- Cat body -->
  <ellipse cx="256" cy="320" rx="110" ry="90" fill="#F2F9FC"/>
  <!-- Cat head -->
  <circle cx="256" cy="210" r="90" fill="#F2F9FC"/>
  <!-- Left ear -->
  <polygon points="180,140 155,80 215,130" fill="#F2F9FC"/>
  <polygon points="183,135 165,96 208,128" fill="#4AAFDC"/>
  <!-- Right ear -->
  <polygon points="332,140 357,80 297,130" fill="#F2F9FC"/>
  <polygon points="329,135 347,96 304,128" fill="#4AAFDC"/>
  <!-- Eyes -->
  <ellipse cx="225" cy="200" rx="14" ry="16" fill="#1A4F6E"/>
  <ellipse cx="287" cy="200" rx="14" ry="16" fill="#1A4F6E"/>
  <circle cx="229" cy="196" r="5" fill="white"/>
  <circle cx="291" cy="196" r="5" fill="white"/>
  <!-- Nose -->
  <polygon points="256,222 248,232 264,232" fill="#F87171"/>
  <!-- Mouth -->
  <path d="M248,232 Q245,240 238,242" stroke="#1A4F6E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M264,232 Q267,240 274,242" stroke="#1A4F6E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="175" y1="225" x2="235" y2="228" stroke="#3A7EA0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="235" x2="233" y2="233" stroke="#3A7EA0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="337" y1="225" x2="277" y2="228" stroke="#3A7EA0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="342" y1="235" x2="279" y2="233" stroke="#3A7EA0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="200" cy="395" rx="35" ry="22" fill="#F2F9FC"/>
  <ellipse cx="312" cy="395" rx="35" ry="22" fill="#F2F9FC"/>
  <!-- Tail -->
  <path d="M366,340 Q420,310 410,260 Q400,220 370,230" stroke="#F2F9FC" stroke-width="22" fill="none" stroke-linecap="round"/>
</svg>
